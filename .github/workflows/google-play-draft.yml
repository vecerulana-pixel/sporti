name: Google Play production draft

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Release name shown in Google Play
        required: false
        default: Sport Tacktick Win
        type: string

permissions:
  contents: read

concurrency:
  group: google-play-production-draft
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build signed AAB and upload draft
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Validate required secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$KEYSTORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          test -n "$PLAY_SERVICE_ACCOUNT_JSON"

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"
          chmod 600 "$RUNNER_TEMP/signing/release.jks"

      - name: Verify English-only app UI
        run: |
          if rg -n '[А-Яа-яЁё]' app/src/main core/*/src/main feature/*/src/main; then
            echo "Non-English app text detected. Move all user-facing copy to English resources."
            exit 1
          fi

      - name: Build and verify Android project
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/signing/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease testDebugUnitTest lintDebug --stacktrace

      - name: Verify AAB signature
        run: jarsigner -verify app/build/outputs/bundle/release/app-release.aab

      - name: Save release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sport-tacktick-win-release-${{ github.run_number }}
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload production draft to Google Play
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.tacktikcwin.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: production
          status: draft
          releaseName: "${{ inputs.release_name }} #${{ github.run_number }}"
          mappingFile: app/build/outputs/mapping/release/mapping.txt
